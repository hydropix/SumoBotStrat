<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 900" font-family="Consolas, monospace" font-size="11">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6Z" fill="#888"/>
    </marker>
    <marker id="arrG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6Z" fill="#2ecc71"/>
    </marker>
    <!-- Laser beam pattern -->
    <pattern id="laserBeam" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="2" height="4" fill="#e74c3c" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1000" height="900" fill="#1a1a2e" rx="8"/>
  <text x="500" y="32" text-anchor="middle" fill="#e0e0e0" font-size="18" font-weight="bold">SUMOBOT — Implantation Mecanique (Vue de dessus)</text>
  <text x="500" y="52" text-anchor="middle" fill="#888" font-size="11">~100mm x 100mm, masse cible 500g, roues 30mm diam.</text>

  <!-- ==================== ROBOT (VUE DE DESSUS) ==================== -->
  <!-- Reference: avant = haut, arriere = bas -->

  <!-- Chassis principal -->
  <rect x="300" y="170" width="200" height="250" rx="6" fill="#1e2d3d" stroke="#546e7a" stroke-width="2"/>
  <text x="400" y="160" text-anchor="middle" fill="#2ecc71" font-size="13" font-weight="bold">AVANT ↑</text>

  <!-- Lame/wedge avant -->
  <path d="M295,175 L505,175 L510,170 L290,170 Z" fill="#78909c" stroke="#90a4ae" stroke-width="1.5"/>
  <text x="400" y="167" text-anchor="middle" fill="#cfd8dc" font-size="9">LAME / WEDGE (1-2mm acier)</text>

  <!-- ==================== ROUES + MOTEURS ==================== -->
  <!-- Roue gauche -->
  <rect x="270" y="270" width="25" height="60" rx="4" fill="#263238" stroke="#f39c12" stroke-width="2"/>
  <text x="282" y="305" text-anchor="middle" fill="#f39c12" font-size="8" transform="rotate(-90,282,305)">ROUE G</text>
  <!-- Moteur gauche (derriere la roue) -->
  <rect x="275" y="278" width="18" height="44" rx="2" fill="#37474f" stroke="#e67e22" stroke-width="1"/>
  <text x="226" y="300" fill="#e67e22" font-size="9" text-anchor="end">N20</text>
  <text x="226" y="312" fill="#888" font-size="8" text-anchor="end">Gauche</text>

  <!-- Roue droite -->
  <rect x="505" y="270" width="25" height="60" rx="4" fill="#263238" stroke="#f39c12" stroke-width="2"/>
  <text x="518" y="305" text-anchor="middle" fill="#f39c12" font-size="8" transform="rotate(90,518,305)">ROUE D</text>
  <!-- Moteur droit -->
  <rect x="507" y="278" width="18" height="44" rx="2" fill="#37474f" stroke="#e67e22" stroke-width="1"/>
  <text x="570" y="300" fill="#e67e22" font-size="9">N20</text>
  <text x="570" y="312" fill="#888" font-size="8">Droite</text>

  <!-- Entraxe roues -->
  <line x1="282" y1="340" x2="282" y2="355" stroke="#888" stroke-width="0.5"/>
  <line x1="518" y1="340" x2="518" y2="355" stroke="#888" stroke-width="0.5"/>
  <line x1="282" y1="350" x2="518" y2="350" stroke="#888" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="400" y="365" text-anchor="middle" fill="#888" font-size="9">← 80mm entraxe →</text>

  <!-- ==================== VL53L0X LASERS ==================== -->
  <!-- Laser centre (d0) -->
  <rect x="388" y="172" width="24" height="16" rx="2" fill="#b71c1c" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="400" y="183" text-anchor="middle" fill="#fff" font-size="7" font-weight="bold">L0</text>
  <!-- Faisceau centre -->
  <line x1="400" y1="172" x2="400" y2="90" stroke="#e74c3c" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- Laser gauche (d1) — angle -30° -->
  <rect x="340" y="174" width="24" height="14" rx="2" fill="#b71c1c" stroke="#e74c3c" stroke-width="1.5" transform="rotate(-30,352,181)"/>
  <text x="350" y="183" text-anchor="middle" fill="#fff" font-size="7" font-weight="bold">L1</text>
  <!-- Faisceau gauche -->
  <line x1="348" y1="174" x2="305" y2="90" stroke="#e74c3c" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- Laser droite (d2) — angle +30° -->
  <rect x="436" y="174" width="24" height="14" rx="2" fill="#b71c1c" stroke="#e74c3c" stroke-width="1.5" transform="rotate(30,448,181)"/>
  <text x="450" y="183" text-anchor="middle" fill="#fff" font-size="7" font-weight="bold">L2</text>
  <!-- Faisceau droite -->
  <line x1="452" y1="174" x2="495" y2="90" stroke="#e74c3c" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- Cone de detection -->
  <path d="M305,90 L400,90 L495,90" stroke="#e74c3c" stroke-width="0.5" fill="none" opacity="0.4"/>
  <path d="M348,174 L305,90 L400,90 L495,90 L452,174" stroke="none" fill="#e74c3c" opacity="0.06"/>
  <text x="400" y="82" text-anchor="middle" fill="#e74c3c" font-size="9">Cone detection 60° — portee 800mm</text>

  <!-- Angle labels -->
  <text x="310" y="145" fill="#e74c3c" font-size="8">-30°</text>
  <text x="395" y="145" fill="#e74c3c" font-size="8">0°</text>
  <text x="475" y="145" fill="#e74c3c" font-size="8">+30°</text>

  <!-- ==================== TCRT5000 LIGNE ==================== -->
  <!-- FL (avant-gauche) -->
  <circle cx="325" cy="178" r="7" fill="none" stroke="#2ecc71" stroke-width="2"/>
  <circle cx="325" cy="178" r="3" fill="#2ecc71"/>
  <text x="310" y="198" fill="#2ecc71" font-size="8">FL</text>
  <text x="310" y="208" fill="#888" font-size="7">A0</text>

  <!-- FR (avant-droite) -->
  <circle cx="475" cy="178" r="7" fill="none" stroke="#2ecc71" stroke-width="2"/>
  <circle cx="475" cy="178" r="3" fill="#2ecc71"/>
  <text x="476" y="198" fill="#2ecc71" font-size="8">FR</text>
  <text x="476" y="208" fill="#888" font-size="7">A1</text>

  <!-- R (arriere-centre) -->
  <circle cx="400" cy="415" r="7" fill="none" stroke="#2ecc71" stroke-width="2"/>
  <circle cx="400" cy="415" r="3" fill="#2ecc71"/>
  <text x="412" y="420" fill="#2ecc71" font-size="8">R (A2)</text>

  <!-- Positions en mm -->
  <line x1="325" y1="185" x2="325" y2="215" stroke="#2ecc71" stroke-width="0.5" stroke-dasharray="2,2"/>
  <line x1="475" y1="185" x2="475" y2="215" stroke="#2ecc71" stroke-width="0.5" stroke-dasharray="2,2"/>
  <text x="400" y="224" text-anchor="middle" fill="#2ecc71" font-size="8">47mm avant, ±45mm lateral</text>

  <!-- ==================== COMPOSANTS INTERNES ==================== -->
  <!-- Arduino Mega -->
  <rect x="330" y="230" width="140" height="60" rx="3" fill="#0d47a1" stroke="#1976d2" stroke-width="1.5" opacity="0.8"/>
  <text x="400" y="255" text-anchor="middle" fill="#90caf9" font-size="10" font-weight="bold">ARDUINO MEGA</text>
  <text x="400" y="270" text-anchor="middle" fill="#64b5f6" font-size="8">+ Shield Sensor</text>
  <text x="400" y="282" text-anchor="middle" fill="#42a5f5" font-size="7">2560</text>

  <!-- L298N -->
  <rect x="330" y="300" width="90" height="45" rx="3" fill="#4a148c" stroke="#7b1fa2" stroke-width="1.5" opacity="0.8"/>
  <text x="375" y="320" text-anchor="middle" fill="#ce93d8" font-size="10" font-weight="bold">L298N</text>
  <text x="375" y="335" text-anchor="middle" fill="#ba68c8" font-size="8">Driver</text>

  <!-- Batterie -->
  <rect x="330" y="355" width="140" height="55" rx="3" fill="#b71c1c" stroke="#e53935" stroke-width="1.5" opacity="0.6"/>
  <text x="400" y="378" text-anchor="middle" fill="#ef9a9a" font-size="10" font-weight="bold">BATTERIE NiMH</text>
  <text x="400" y="393" text-anchor="middle" fill="#ef5350" font-size="9">7.2V — Centre de gravite bas</text>

  <!-- Buck (petit) -->
  <rect x="430" y="305" width="60" height="35" rx="3" fill="#e65100" stroke="#ff6d00" stroke-width="1" opacity="0.8"/>
  <text x="460" y="322" text-anchor="middle" fill="#ffab40" font-size="8" font-weight="bold">BUCK</text>
  <text x="460" y="333" text-anchor="middle" fill="#ffa726" font-size="7">LM2596</text>

  <!-- Bouton -->
  <circle cx="310" cy="400" r="8" fill="#1b5e20" stroke="#4caf50" stroke-width="1.5"/>
  <text x="310" y="403" text-anchor="middle" fill="#fff" font-size="7">GO</text>

  <!-- ==================== ARRIERE ==================== -->
  <text x="400" y="440" text-anchor="middle" fill="#888" font-size="11">ARRIERE ↓</text>

  <!-- ==================== COTES DIMENSIONELLES ==================== -->
  <!-- Largeur chassis -->
  <line x1="300" y1="460" x2="300" y2="480" stroke="#ccc" stroke-width="0.5"/>
  <line x1="500" y1="460" x2="500" y2="480" stroke="#ccc" stroke-width="0.5"/>
  <line x1="300" y1="475" x2="500" y2="475" stroke="#ccc" stroke-width="0.5"/>
  <text x="400" y="490" text-anchor="middle" fill="#ccc" font-size="10">100mm</text>

  <!-- Hauteur -->
  <line x1="540" y1="170" x2="560" y2="170" stroke="#ccc" stroke-width="0.5"/>
  <line x1="540" y1="420" x2="560" y2="420" stroke="#ccc" stroke-width="0.5"/>
  <line x1="555" y1="170" x2="555" y2="420" stroke="#ccc" stroke-width="0.5"/>
  <text x="560" y="300" fill="#ccc" font-size="10" transform="rotate(90,560,300)">~100mm</text>

  <!-- ==================== SCHEMA EMPILAGE LATERAL ==================== -->
  <text x="170" y="530" text-anchor="middle" fill="#e0e0e0" font-size="14" font-weight="bold">Vue laterale (coupe)</text>

  <!-- Sol / Ring -->
  <rect x="30" y="750" width="350" height="6" rx="2" fill="#37474f"/>
  <text x="205" y="770" text-anchor="middle" fill="#78909c" font-size="9">RING (dohyo)</text>

  <!-- Lame -->
  <rect x="30" y="744" width="120" height="6" rx="1" fill="#78909c" stroke="#90a4ae" stroke-width="1"/>
  <text x="90" y="740" text-anchor="middle" fill="#b0bec5" font-size="8">Lame 1-2mm</text>

  <!-- Roues -->
  <circle cx="100" cy="735" r="15" fill="none" stroke="#f39c12" stroke-width="2"/>
  <circle cx="100" cy="735" r="3" fill="#f39c12"/>
  <text x="100" y="710" text-anchor="middle" fill="#f39c12" font-size="8">Roue 30mm</text>
  <circle cx="300" cy="735" r="15" fill="none" stroke="#f39c12" stroke-width="2"/>
  <circle cx="300" cy="735" r="3" fill="#f39c12"/>

  <!-- Chassis empilage -->
  <rect x="60" y="700" width="280" height="20" rx="2" fill="#1e2d3d" stroke="#546e7a" stroke-width="1"/>
  <text x="200" y="714" text-anchor="middle" fill="#78909c" font-size="8">Chassis (3mm alu/PLA)</text>

  <!-- Batterie -->
  <rect x="100" y="675" width="200" height="25" rx="3" fill="#b71c1c" opacity="0.6" stroke="#e53935" stroke-width="1"/>
  <text x="200" y="692" text-anchor="middle" fill="#ef9a9a" font-size="9">Batterie NiMH 7.2V (le plus lourd → en bas)</text>

  <!-- Arduino + shield -->
  <rect x="80" y="648" width="240" height="27" rx="2" fill="#0d47a1" opacity="0.7" stroke="#1976d2" stroke-width="1"/>
  <text x="200" y="665" text-anchor="middle" fill="#90caf9" font-size="9">Arduino Mega + Shield Sensor</text>

  <!-- L298N + Buck -->
  <rect x="120" y="625" width="100" height="23" rx="2" fill="#4a148c" opacity="0.7" stroke="#7b1fa2" stroke-width="1"/>
  <text x="170" y="640" text-anchor="middle" fill="#ce93d8" font-size="8">L298N</text>
  <rect x="230" y="625" width="60" height="23" rx="2" fill="#e65100" opacity="0.7" stroke="#ff6d00" stroke-width="1"/>
  <text x="260" y="640" text-anchor="middle" fill="#ffab40" font-size="8">Buck</text>

  <!-- Hauteur totale -->
  <line x1="370" y1="625" x2="390" y2="625" stroke="#ccc" stroke-width="0.5"/>
  <line x1="370" y1="750" x2="390" y2="750" stroke="#ccc" stroke-width="0.5"/>
  <line x1="385" y1="625" x2="385" y2="750" stroke="#ccc" stroke-width="0.5"/>
  <text x="398" y="690" fill="#ccc" font-size="9">~50mm</text>
  <text x="398" y="703" fill="#888" font-size="8">hauteur</text>

  <!-- TCRT vers le sol -->
  <line x1="80" y1="720" x2="80" y2="748" stroke="#2ecc71" stroke-width="1" stroke-dasharray="2,2"/>
  <circle cx="80" cy="748" r="4" fill="none" stroke="#2ecc71" stroke-width="1"/>
  <text x="48" y="735" fill="#2ecc71" font-size="7">TCRT</text>
  <text x="48" y="745" fill="#2ecc71" font-size="7">~3mm</text>

  <!-- Laser vers l'avant -->
  <rect x="60" y="695" width="12" height="8" rx="1" fill="#b71c1c" stroke="#e74c3c" stroke-width="1"/>
  <line x1="60" y1="699" x2="30" y2="699" stroke="#e74c3c" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="26" y="695" fill="#e74c3c" font-size="7" text-anchor="end">VL53L0X</text>

  <!-- ==================== CHECKLIST MONTAGE ==================== -->
  <rect x="480" y="530" width="480" height="350" rx="6" fill="#111827" stroke="#444" stroke-width="1"/>
  <text x="720" y="555" text-anchor="middle" fill="#e0e0e0" font-size="14" font-weight="bold">CHECKLIST MONTAGE</text>

  <text x="500" y="580" fill="#f39c12" font-size="11" font-weight="bold">Ordre d'empilage (bas → haut) :</text>
  <text x="510" y="598" fill="#ecf0f1" font-size="10">1. Chassis alu/PLA 3mm (percages moteurs + capteurs)</text>
  <text x="510" y="614" fill="#ecf0f1" font-size="10">2. Batterie NiMH collee/velcro au centre (CdG bas)</text>
  <text x="510" y="630" fill="#ecf0f1" font-size="10">3. Arduino Mega + Shield Sensor (entretoises M3)</text>
  <text x="510" y="646" fill="#ecf0f1" font-size="10">4. L298N + Buck LM2596 (entretoises ou double-face)</text>
  <text x="510" y="662" fill="#ecf0f1" font-size="10">5. Lame avant (vis M3 sur le chassis)</text>

  <text x="500" y="690" fill="#e74c3c" font-size="11" font-weight="bold">Capteurs :</text>
  <text x="510" y="708" fill="#ecf0f1" font-size="10">- TCRT5000 : 2-4mm du sol, face vers le bas</text>
  <text x="510" y="724" fill="#ecf0f1" font-size="10">- VL53L0X : a hauteur du chassis (~25mm du sol)</text>
  <text x="510" y="740" fill="#ecf0f1" font-size="10">  Centre: droit devant, G/D: ±30° en V</text>
  <text x="510" y="756" fill="#ecf0f1" font-size="10">  Fixer sur support imprime 3D angle</text>

  <text x="500" y="782" fill="#2ecc71" font-size="11" font-weight="bold">Centre de gravite :</text>
  <text x="510" y="800" fill="#ecf0f1" font-size="10">- Batterie la plus lourde → centree et en bas</text>
  <text x="510" y="816" fill="#ecf0f1" font-size="10">- CdG devant l'axe des roues = meilleure poussee</text>
  <text x="510" y="832" fill="#ecf0f1" font-size="10">- Poids max 500g avec lame (verifier a la balance)</text>

  <text x="500" y="858" fill="#9b59b6" font-size="11" font-weight="bold">Roues :</text>
  <text x="510" y="870" fill="#ecf0f1" font-size="10">- Silicone/caoutchouc souple = max adherence</text>
</svg>
